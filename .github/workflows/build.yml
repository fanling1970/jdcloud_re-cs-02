name: LEDE编译终极版（含DIY与Dockerman强制注入）

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: 检查DIY脚本
      run: |
        echo "检查DIY脚本..."
        for script in lede/diy-part1.sh lede/diy-part2.sh; do
          if [ -f "$script" ]; then
            echo "找到: $script ($(wc -l < "$script") 行)"
            chmod +x "$script" 2>/dev/null || true
          else
            echo "未找到: $script"
          fi
        done
    
    - name: 克隆LEDE源码
      run: git clone --depth=1 https://github.com/coolsnowwolf/lede.git lede-src
    
    - name: 执行DIY Part 1
      run: |
        if [ -f "lede/diy-part1.sh" ] && [ -s "lede/diy-part1.sh" ]; then
          cd lede-src && ../lede/diy-part1.sh
        fi
    
    - name: 验证并应用配置
      run: |
        if [ ! -f "lede/ax6600-smart.config" ]; then
          echo "配置文件不存在"; exit 1
        fi
        
        # 清理Tab和BOM
        sed -i 's/\t/    /g' "lede/ax6600-smart.config" 2>/dev/null || true
        sed -i '1s/^\xEF\xBB\xBF//' "lede/ax6600-smart.config" 2>/dev/null || true
        
        cd lede-src
        cp ../lede/ax6600-smart.config .config
        echo "配置已应用 ($(wc -l < .config) 行)"
    
    - name: 更新feeds
      run: |
        cd lede-src
        FORCE=1 ./scripts/feeds update -a
        FORCE=1 ./scripts/feeds install -a
    
    - name: 执行DIY Part 2
      run: |
        if [ -f "lede/diy-part2.sh" ] && [ -s "lede/diy-part2.sh" ]; then
          cd lede-src && ../lede/diy-part2.sh
        fi
    
    - name: 解析配置依赖并强制注入Docker
      run: |
        cd lede-src
        
        echo "Step 1: 首次 defconfig 解析基础配置..."
        make defconfig 2>&1 | grep -v "^WARNING:" | tail -5
        
        echo ""
        echo "Step 2: 强制注入并补全 Docker/Dockerman 配置..."
        # 1. 先清除 .config 中所有可能冲突或错误的旧 docker 配置
        sed -i '/CONFIG_PACKAGE_.*docker/d' .config
        sed -i '/CONFIG_PACKAGE_.*containerd/d' .config
        sed -i '/CONFIG_PACKAGE_.*runc/d' .config
        sed -i '/CONFIG_PACKAGE_.*cgroupfs-mount/d' .config
        sed -i '/CONFIG_PACKAGE_kmod-veth/d' .config
        sed -i '/CONFIG_PACKAGE_kmod-macvlan/d' .config
        sed -i '/CONFIG_PACKAGE_kmod-ipvlan/d' .config
        sed -i '/CONFIG_PACKAGE_kmod-br-netfilter/d' .config
        
        # 2. 追加经过验证的、当前源码中实际存在的最小完备集
        # 注意：使用 <<- 允许结束符缩进，防止YAML块提前终止
        cat >> .config <<- 'DOCKER_EOF'
        CONFIG_PACKAGE_luci-app-dockerman=y
        CONFIG_PACKAGE_luci-i18n-dockerman-zh-cn=y
        CONFIG_PACKAGE_dockerd=y
        CONFIG_PACKAGE_containerd=y
        CONFIG_PACKAGE_runc=y
        CONFIG_PACKAGE_docker-cli=y
        CONFIG_PACKAGE_cgroupfs-mount=y
        CONFIG_PACKAGE_kmod-veth=y
        CONFIG_PACKAGE_kmod-macvlan=y
        CONFIG_PACKAGE_kmod-ipvlan=y
        CONFIG_PACKAGE_kmod-br-netfilter=y
        CONFIG_PACKAGE_kmod-bridge=y
        CONFIG_PACKAGE_fdisk=y
        CONFIG_PACKAGE_parted=y
        CONFIG_PACKAGE_lsblk=y
        DOCKER_EOF
        
        echo "Docker 配置已强制注入"
        
        echo ""
        echo "Step 3: 再次 defconfig 解析注入后的完整依赖..."
        make defconfig 2>&1 | grep -v "^WARNING:" | tail -5
        
        echo ""
        echo "=== Docker/Dockerman 最终配置验证 ==="
        grep -E "CONFIG_PACKAGE_(luci-app-dockerman|dockerd|containerd|runc)=" .config || true
        echo ""
        
        # 最终兜底验证
        if ! grep -q "CONFIG_PACKAGE_luci-app-dockerman=y" .config; then
          echo "致命错误：luci-app-dockerman 仍未被选中！"
          echo "请检查 feeds/luci/applications/ 目录下是否存在 dockerman 源码"
          ls feeds/luci/applications/ | grep docker || echo "feeds 中未找到 docker 相关应用"
          exit 1
        fi
        
        echo "配置验证通过，Dockerman 已成功锁定"
    
    - name: 编译固件
      run: |
        cd lede-src
        FORCE=1 make -j$(nproc) V=s 2>&1 | tee build.log || {
          echo "并行编译失败，回退单线程..."
          FORCE=1 make -j1 V=s 2>&1 | tee -a build.log
        }
    
    - name: 验证并上传
      uses: actions/upload-artifact@v4
      with:
        name: firmware-with-diy-and-dockerman
        path: lede-src/bin/targets/qualcommax/ipq60xx/*.bin
