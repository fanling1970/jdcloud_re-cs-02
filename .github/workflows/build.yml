name: Build Athena OpenWrt Firmware

于:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:           # 允许手动触发
  schedule:
    - cron: '0 2 * * 0'        # 每周日凌晨2点自动编译

jobs:
  build-athena:
    runs-on: ubuntu-22.04
    timeout-minutes: 180       # 3小时超时
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        submodules: recursive
    
    - name: Setup environment
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache ecj fastjar file g++ gawk \
          gettext git java-propose-classpath libelf-dev libncurses5-dev \
          libncursesw5-dev libssl-dev python3 python3-distutils python3-setuptools \
          python3-pip rsync subversion swig time xsltproc zlib1g-dev
    
    - name: Clone LEDE source
      run: |
        git clone https://github.com/coolsnowwolf/lede.git openwrt
        cd openwrt
        git checkout master
    
    - name: Configure for Athena
      run: |
        cd openwrt
        # 应用京东云雅典娜配置
        cp ../athena.config .config
        
        # 更新feeds
        echo "src-git packages https://github.com/coolsnowwolf/packages" > feeds.conf.default
        echo "src-git luci https://github.com/coolsnowwolf/luci" >> feeds.conf.default
        echo "src-git routing https://git.openwrt.org/feed/routing.git" >> feeds.conf.default
        echo "src-git telephony https://git.openwrt.org/feed/telephony.git" >> feeds.conf.default
        
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
        # 应用配置
        make defconfig
    
    - name: Download dependencies
      run: |
        cd openwrt
        make -j$(nproc) download 2>&1 | tee download.log
    
    - name: Build firmware
      run: |
        cd openwrt
        echo "开始编译京东云雅典娜固件..."
        make -j$(($(nproc) + 1)) V=s 2>&1 | tee build.log
        
        # 检查编译结果
        if [ -f "bin/targets/ipq60xx/generic/openwrt-ipq60xx-generic-jdcloud_re-cs-02-squashfs-sysupgrade.bin" ]; then
          echo "编译成功！"
          ls -la bin/targets/ipq60xx/generic/*.bin
        else
          echo "编译失败！"
          tail -100 build.log
          exit 1
        fi
    
    - name: Upload firmware artifact
      uses: actions/upload-artifact@v3
      with:
        name: athena-firmware
        path: openwrt/bin/targets/ipq60xx/generic/
        retention-days: 7
    
    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: build-logs
        path: |
          openwrt/build.log
          openwrt/download.log
        retention-days: 7
