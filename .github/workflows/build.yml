name: Build Athena OpenWrt Firmware

on:
  workflow_dispatch:
    inputs:
      upload_artifacts:
        description: '上传构建产物到 Release'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: 检查DIY脚本
      run: |
        echo "检查DIY脚本..."
        for script in lede/diy-part1.sh lede/diy-part2.sh; do
          if [ -f "$script" ]; then
            echo "找到: $script ($(wc -l < "$script") 行)"
            chmod +x "$script" 2>/dev/null || true
          else
            echo "未找到: $script"
          fi
        done

    # ========== 关键修改：锁定上游 LEDE 源码版本 ==========
    # 原代码每次拉取最新 master，导致 6月5日内核升级后无线失效
    # 现在锁定到 2026年6月2日的 commit (de1795d)
    # 这是 6月3日成功编译时的上游版本，无线功能正常
    - name: 克隆LEDE源码（锁定版本）
      run: |
        git clone https://github.com/coolsnowwolf/lede.git lede-src
        cd lede-src && git checkout de1795d
        echo "✅ 已锁定 LEDE 源码到 commit: $(git rev-parse --short HEAD)"
        echo "📅 提交日期: $(git log -1 --format=%ci)"
        echo "📝 提交信息: $(git log -1 --format=%s)"

    - name: 执行DIY Part 1
      run: |
        if [ -f "lede/diy-part1.sh" ] && [ -s "lede/diy-part1.sh" ]; then
          cd lede-src && ../lede/diy-part1.sh
        fi

    - name: 验证并应用配置
      run: |
        if [ ! -f "lede/ax6600-smart.config" ]; then
          echo "配置文件不存在"; exit 1
        fi

        # 清理Tab和BOM
        sed -i 's/\t/    /g' "lede/ax6600-smart.config" 2>/dev/null || true
        sed -i '1s/^\xEF\xBB\xBF//' "lede/ax6600-smart.config" 2>/dev/null || true

        cd lede-src
        cp ../lede/ax6600-smart.config .config
        echo "配置已应用 ($(wc -l < .config) 行)"

    - name: 更新feeds
      run: |
        cd lede-src
        FORCE=1 ./scripts/feeds update -a
        FORCE=1 ./scripts/feeds install -a

    - name: 执行DIY Part 2
      run: |
        if [ -f "lede/diy-part2.sh" ] && [ -s "lede/diy-part2.sh" ]; then
          cd lede-src && ../lede/diy-part2.sh
        fi

    - name: 解析配置依赖并强制注入Docker
      run: |
        cd lede-src

        echo "Step 1: 首次 defconfig 解析基础配置..."
        make defconfig 2>&1 | grep -v "^WARNING:" | tail -5

        echo ""
        echo "Step 2: 强制注入并补全 Docker/Dockerman 配置..."

        # 1. 先清除 .config 中所有可能冲突或错误的旧 docker 配置
        sed -i '/CONFIG_PACKAGE_.*docker/d' .config
        sed -i '/CONFIG_PACKAGE_.*containerd/d' .config
        sed -i '/CONFIG_PACKAGE_.*runc/d' .config
        sed -i '/CONFIG_PACKAGE_.*cgroupfs-mount/d' .config
        sed -i '/CONFIG_PACKAGE_kmod-veth/d' .config

        # 2. 强制开启核心 docker 配置项
        cat >> .config << 'EOF'

# === 强制注入的 Docker/Dockerman 配置 ===
CONFIG_PACKAGE_dockerd=y
CONFIG_PACKAGE_dockerd_INIT=y
CONFIG_PACKAGE_containerd=y
CONFIG_PACKAGE_runc=y
CONFIG_PACKAGE_cgroupfs-mount=y
CONFIG_PACKAGE_kmod-veth=y
EOF

        # 3. 清除可能的冲突项
        sed -i '/^# CONFIG_PACKAGE_luci-app-docker is not set$/d' .config
        sed -i '/^# CONFIG_PACKAGE_luci-app-dockerman is not set$/d' .config

        # 4. 注入 LuCI Dockerman 界面
        cat >> .config << 'EOF'
CONFIG_PACKAGE_luci-app-dockerman=y
CONFIG_LUCI_DEPENDS="!arm64"
EOF

        echo "Step 3: 二次 defconfig 解析最终配置..."
        make defconfig 2>&1 | grep -E "(Docker|docker|dockerman|containerd|runc)" | head -20 || true

        echo ""
        echo "=== 配置验证 ==="
        echo "dockerd:       $(grep -c '^CONFIG_PACKAGE_dockerd=y$' .config || echo 0)"
        echo "containerd:    $(grep -c '^CONFIG_PACKAGE_containerd=y$' .config || echo 0)"
        echo "runc:          $(grep -c '^CONFIG_PACKAGE_runc=y$' .config || echo 0)"
        echo "dockerman:     $(grep -c '^CONFIG_PACKAGE_luci-app-dockerman=y$' .config || echo 0)"

    - name: 下载编译依赖
      run: |
        cd lede-src
        make download -j$(nproc)
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件
      run: |
        cd lede-src
        echo "$(nproc) thread build"
        make -j$(nproc) || make -j1 V=s
        echo "Build completed at $(date)"

    - name: 上传固件
      uses: actions/upload-artifact@v4
      with:
        name: openwrt-firmware-${{ github.run_id }}
        path: lede-src/bin/targets/qualcommax/ipq60xx/*.bin
