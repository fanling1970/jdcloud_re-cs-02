name: LEDE固件编译（最精简版）

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/coolsnowwolf/lede.git
  REPO_BRANCH: master
  FEEDS_CONF: lede/feeds.conf.default
  CONFIG_FILE: lede/.config
  DIY_P1_SH: lede/diy-part1.sh
  DIY_P2_SH: lede/diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: 检查磁盘空间
        run: |
          echo "编译前磁盘空间:"
          df -h
      
      - name: 快速磁盘清理
        run: |
          sudo apt-get clean 2>/dev/null || true
          sudo rm -rf /tmp/* /var/tmp/* 2>/dev/null || true
      
      - name: 检出代码仓库
        uses: actions/checkout@v4
      
      - name: 初始化编译环境（最精简版）
        timeout-minutes: 8
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          echo "🚀 开始最精简初始化..."
          
          # 使用清华源加速
          sudo cp /etc/apt/sources.list /etc/apt/sources.list.backup
          sudo sed -i 's|http://.*ubuntu.com|https://mirrors.tuna.tsinghua.edu.cn|g' /etc/apt/sources.list
          
          echo "📦 快速更新软件包列表..."
          sudo apt-get update -qq 2>/dev/null || echo "更新跳过"
          
          echo "🔧 安装OpenWrt编译最小工具集..."
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            git \
            gcc g++ make \
            bison flex gawk gettext \
            libncurses5-dev libncursesw5-dev \
            python3 \
            curl wget \
            autoconf automake libtool \
            libssl-dev zlib1g-dev
          
          # 恢复原源文件
          sudo cp /etc/apt/sources.list.backup /etc/apt/sources.list
          
          # 设置时区
          sudo timedatectl set-timezone "$TZ"
          
          echo "✅ 初始化完成！"
      
      - name: 克隆LEDE源代码
        run: |
          echo "📥 克隆LEDE源代码..."
          git clone --depth=1 $REPO_URL -b $REPO_BRANCH openwrt
      
      - name: 加载配置
        run: |
          [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
          [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
          chmod +x $DIY_P1_SH $DIY_P2_SH
      
      - name: 更新和安装软件源
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          $GITHUB_WORKSPACE/$DIY_P1_SH
          $GITHUB_WORKSPACE/$DIY_P2_SH
      
      - name: 下载依赖包
        run: |
          cd openwrt
          make defconfig
          make download -j$(nproc) || make download -j1
      
      - name: 编译固件
        timeout-minutes: 120
        run: |
          cd openwrt
          echo "使用 $(nproc) 线程编译"
          make -j$(nproc) || make -j1 || make -j1 V=s
      
      - name: 上传固件
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: LEDE固件_$(date +%Y%m%d)
          path: openwrt/bin/targets/*/*/
