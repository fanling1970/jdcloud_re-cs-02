name: LEDE编译终极版

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: 克隆LEDE源码
      run: git clone --depth=1 https://github.com/coolsnowwolf/lede.git lede-src
    
    - name: 应用配置
      run: |
        cd lede-src
        if [ -f "../lede/ax6600-smart.config" ]; then
          cp ../lede/ax6600-smart.config .config
        else
          echo "使用默认配置"
        fi
    
    - name: 更新feeds
      run: |
        cd lede-src
        ./scripts/feeds update -a
        ./scripts/feeds install -a
    
    - name: 编译
      run: |
        cd lede-src
        make defconfig
        make -j$(nproc)
    
    - name: 上传
      uses: actions/upload-artifact@v4
      with:
        name: firmware
        path: lede-src/bin/targets/
