name: LEDE固件编译（最终修复版）

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  REPO_URL: https://github.com/coolsnowwolf/lede.git
  REPO_BRANCH: master
  CONFIG_FILE: lede/ax6600.config
  UPLOAD_FIRMWARE: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
    - name: 检出代码仓库
      uses: actions/checkout@v4
      
    - name: 验证配置文件
      run: |
        echo "🔍 验证配置文件..."
        echo "配置文件: $CONFIG_FILE"
        
        # 检查文件是否存在
        if [ ! -f "$CONFIG_FILE" ]; then
          echo "❌ 错误：配置文件不存在"
          exit 1
        fi
        
        # 检查关键配置
        echo "检查关键配置:"
        echo "1. 检查x86配置（应该没有）:"
        if grep -q "CONFIG_TARGET_x86=y" "$CONFIG_FILE"; then
          echo "❌ 发现x86配置！"
          exit 1
        fi
        echo "✅ 未发现x86配置"
        
        echo "2. 检查qualcommax配置（应该有）:"
        if ! grep -q "CONFIG_TARGET_qualcommax=y" "$CONFIG_FILE"; then
          echo "❌ 缺少qualcommax配置！"
          exit 1
        fi
        echo "✅ 找到qualcommax配置"
        
        echo "3. 检查JDCloud设备配置:"
        if ! grep -q "CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_jdcloud_re-cs-02=y" "$CONFIG_FILE"; then
          echo "⚠️ 警告：未找到JDCloud设备配置"
        else
          echo "✅ 找到JDCloud设备配置"
        fi
        
        echo "✅ 配置文件验证通过"
        
    - name: 安装编译依赖
      run: |
        echo "📦 安装编译依赖..."
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          git \
          gcc \
          g++ \
          make \
          libncurses5-dev \
          libncursesw5-dev \
          python3 \
          unzip \
          wget
        
    - name: 克隆LEDE源代码
      run: |
        echo "📥 克隆LEDE源代码..."
        git clone --depth=1 "$REPO_URL" -b "$REPO_BRANCH" openwrt
        
    - name: 应用配置文件（关键步骤）
      run: |
        echo "🔧 应用配置文件..."
        
        # 1. 进入openwrt目录
        cd openwrt
        
        # 2. 清理可能存在的旧配置
        rm -f .config .config.old 2>/dev/null || true
        
        # 3. 复制我们的配置文件
        cp "../$CONFIG_FILE" .config
        
        # 4. 立即验证复制结果
        echo "验证复制结果:"
        if [ ! -f .config ]; then
          echo "❌ 错误：配置文件未复制成功"
          exit 1
        fi
        
        # 5. 检查关键配置
        echo "检查复制后的配置:"
        if grep -q "CONFIG_TARGET_x86=y" .config; then
          echo "❌ 致命错误：复制后出现x86配置！"
          exit 1
        fi
        
        if ! grep -q "CONFIG_TARGET_qualcommax=y" .config; then
          echo "❌ 致命错误：复制后缺少qualcommax配置！"
          exit 1
        fi
        
        echo "✅ 配置文件应用成功"
        
        # 6. 创建备份
        cp .config .config.backup
        
    - name: 更新feeds（安全模式）
      run: |
        echo "🔄 更新feeds（安全模式）..."
        cd openwrt
        
        # 1. 首先备份当前配置
        cp .config .config.before_feeds
        
        # 2. 设置环境变量防止自动配置
        export CONFIG_AUTOREBUILD=0
        export CONFIG_AUTOCONFIG=0
        
        # 3. 更新feeds
        ./scripts/feeds update -a
        
        # 4. 安装feeds
        ./scripts/feeds install -a
        
        # 5. 验证配置未被修改
        if ! cmp -s .config .config.before_feeds; then
          echo "⚠️ 警告：配置文件在更新feeds时被修改"
          echo "恢复备份配置..."
          cp .config.before_feeds .config
        else
          echo "✅ 配置文件未被修改"
        fi
        
    - name: 下载依赖包
      run: |
        echo "📥 下载依赖包..."
        cd openwrt
        
        # 1. 备份配置
        cp .config .config.before_download
        
        # 2. 设置环境变量
        export CONFIG_AUTOREBUILD=0
        export CONFIG_AUTOCONFIG=0
        
        # 3. 下载依赖
        make download -j$(nproc) || make download -j1
        
        # 4. 验证配置
        if ! cmp -s .config .config.before_download; then
          echo "❌ 错误：配置文件在下载依赖时被修改！"
          echo "差异:"
          diff -u .config.before_download .config | grep -E "^[+-].*CONFIG_TARGET" || true
          echo "恢复原始配置..."
          cp .config.backup .config
        fi
        
    - name: 编译前最终验证
      run: |
        echo "🔍 编译前最终验证..."
        cd openwrt
        
        # 1. 与原始备份比较
        if ! cmp -s .config .config.backup; then
          echo "❌ 致命错误：配置文件已被修改！"
          echo "关键差异:"
          diff -u .config.backup .config | grep -E "^[+-].*CONFIG_TARGET" | head -20
          exit 1
        fi
        
        # 2. 检查x86配置
        if grep -q "CONFIG_TARGET_x86=y" .config; then
          echo "❌ 致命错误：发现x86配置！"
          grep -i "CONFIG_TARGET_x86" .config
          exit 1
        fi
        
        # 3. 检查目标配置
        if ! grep -q "CONFIG_TARGET_qualcommax=y" .config; then
          echo "❌ 致命错误：缺少qualcommax配置！"
          exit 1
        fi
        
        echo "🎯 关键配置确认:"
        echo "目标架构: qualcommax"
        echo "目标设备: ipq60xx"
        echo "目标型号: jdcloud_re-cs-02"
        echo "✅ 所有验证通过，准备编译"
        
    - name: 编译固件
      run: |
        echo "🔨 开始编译固件..."
        cd openwrt
        
        # 记录开始时间
        start_time=$(date +%s)
        
        echo "使用核心数: $(nproc)"
        
        # 编译（先尝试并行编译）
        make -j$(nproc) || {
          echo "⚠️ 并行编译失败，尝试单线程编译..."
          make -j1 V=s
        }
        
        # 记录结束时间
        end_time=$(date +%s)
        duration=$((end_time - start_time))
        echo "⏱️ 编译耗时: ${duration}秒 ($((duration/60))分$((duration%60))秒)"
        
    - name: 验证编译结果
      run: |
        echo "🔍 验证编译结果..."
        
        if [ -d "openwrt/bin/targets/qualcommax/ipq60xx" ]; then
          echo "🎉 成功编译出ARM架构固件！"
          echo ""
          echo "📁 固件目录: openwrt/bin/targets/qualcommax/ipq60xx"
          echo ""
          echo "📄 生成的固件文件:"
          find openwrt/bin/targets/qualcommax/ipq60xx -name "*.bin" -o -name "*.img" | while read file; do
            size=$(stat -c "%s" "$file" 2>/dev/null || stat -f "%z" "$file" 2>/dev/null || echo "未知")
            if [ "$size" != "未知" ]; then
              size_mb=$((size/1024/1024))
              echo "  - $(basename "$file") (${size_mb}MB)"
            else
              echo "  - $(basename "$file")"
            fi
          done
        else
          echo "❌ 错误：未找到ARM架构固件"
          echo ""
          echo "当前目录结构:"
          find openwrt/bin/targets -type d 2>/dev/null || echo "未找到targets目录"
          echo ""
          echo "所有targets目录:"
          find openwrt/bin -type d -name "*target*" 2>/dev/null || true
          exit 1
        fi
        
    - name: 上传固件
      if: env.UPLOAD_FIRMWARE == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: lede-firmware
        path: openwrt/bin/targets/
        retention-days: 7
