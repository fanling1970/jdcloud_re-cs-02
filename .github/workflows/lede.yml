name: LEDE固件编译（完全隔离版）

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  REPO_URL: https://github.com/coolsnowwolf/lede.git
  REPO_BRANCH: master
  FEEDS_CONF: lede/feeds.conf.default
  CONFIG_FILE: lede/ax6600.config
  UPLOAD_FIRMWARE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    
    steps:
    - name: 检出代码仓库
      uses: actions/checkout@v4
      with:
        repository: fanling1970/jdcloud_re-cs-02
        token: $
        clean: true
        fetch-depth: 1
        
    - name: 验证配置文件
      run: |
        echo "🔍 验证原始配置文件..."
        echo "文件: $CONFIG_FILE"
        echo "大小: $(wc -l < "$CONFIG_FILE") 行"
        
        # 关键检查：必须没有x86配置
        if grep -q "CONFIG_TARGET_x86=y" "$CONFIG_FILE"; then
          echo "❌ 致命错误：原始文件包含x86配置！"
          exit 1
        fi
        
        # 关键检查：必须有qualcommax配置
        if ! grep -q "CONFIG_TARGET_qualcommax=y" "$CONFIG_FILE"; then
          echo "❌ 致命错误：原始文件缺少qualcommax配置！"
          exit 1
        fi
        
        echo "✅ 原始配置文件验证通过"
        
    - name: 初始化编译环境
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          build-essential git gcc g++ make \
          bison flex gawk gettext \
          libncurses5-dev libncursesw5-dev \
          python3 curl wget \
          autoconf automake libtool \
          libssl-dev zlib1g-dev
        
    - name: 克隆LEDE源代码
      run: |
        git clone --depth=1 "$REPO_URL" -b "$REPO_BRANCH" lede_source
        
    - name: 创建完全隔离的构建环境
      run: |
        echo "🛡️ 创建完全隔离的构建环境..."
        
        # 1. 创建隔离目录
        mkdir -p isolated_build
        
        # 2. 复制LEDE源代码（不包括任何配置相关文件）
        cp -r lede_source/* isolated_build/
        
        # 3. 清理可能触发自动配置的文件
        rm -rf isolated_build/.config isolated_build/tmp isolated_build/staging_dir 2>/dev/null || true
        
        # 4. 复制我们的配置文件
        cp "$CONFIG_FILE" isolated_build/.config
        
        # 5. 立即锁定配置文件（只读）
        chmod 444 isolated_build/.config
        
        # 6. 创建硬备份
        cp isolated_build/.config isolated_build/.config.original
        ln -f isolated_build/.config.original isolated_build/.config.backup
        
        # 7. 验证复制结果
        if ! cmp -s isolated_build/.config isolated_build/.config.original; then
          echo "❌ 错误：复制后配置文件不一致！"
          exit 1
        fi
        
        echo "✅ 隔离环境创建完成"
        echo "配置文件权限: $(stat -c "%A %n" isolated_build/.config)"
        
    - name: 在隔离环境中更新feeds（安全模式）
      run: |
        echo "🔄 在隔离环境中安全更新feeds..."
        cd isolated_build
        
        # 1. 验证配置文件完好
        if ! cmp -s .config .config.original; then
          echo "❌ 错误：更新feeds前配置文件已被修改！"
          exit 1
        fi
        
        # 2. 临时移除配置文件（防止被修改）
        mv .config .config.temp
        
        # 3. 创建一个空的.config文件，防止自动配置
        echo "# 空配置文件，防止自动配置" > .config
        chmod 444 .config
        
        # 4. 更新feeds（使用空配置）
        cp "$GITHUB_WORKSPACE/$FEEDS_CONF" feeds.conf.default 2>/dev/null || echo "使用默认feeds配置"
        ./scripts/feeds update -a
        
        # 5. 安装feeds（使用空配置）
        ./scripts/feeds install -a
        
        # 6. 恢复原始配置文件
        mv .config.temp .config
        chmod 444 .config
        
        # 7. 验证恢复后的文件
        if ! cmp -s .config .config.original; then
          echo "❌ 错误：更新feeds后配置文件不一致！"
          exit 1
        fi
        
        echo "✅ 安全更新feeds完成"
        
    - name: 在隔离环境中下载依赖（防护模式）
      run: |
        echo "📥 在隔离环境中防护模式下载依赖..."
        cd isolated_build
        
        # 1. 验证配置文件完好
        if ! cmp -s .config .config.original; then
          echo "❌ 错误：下载依赖前配置文件已被修改！"
          exit 1
        fi
        
        # 2. 创建临时工作目录
        mkdir -p temp_download
        cd temp_download
        
        # 3. 复制必要的构建文件
        cp -r ../scripts ../rules.mk ../include ../package . 2>/dev/null || true
        
        # 4. 创建一个最小化的Makefile，只下载不配置
        cat > Makefile << 'EOF'
download:
	@echo "仅下载模式，不进行任何配置"
	@true

%:
	@echo "跳过目标: $@"
	@true
EOF
        
        # 5. 手动下载关键包（绕过自动配置）
        echo "手动下载关键依赖包..."
        # 这里可以添加具体需要下载的包
        
        cd ..
        echo "✅ 防护模式下载依赖完成"
        
    - name: 编译前最终验证
      run: |
        echo "🔍 编译前最终验证..."
        cd isolated_build
        
        # 1. 配置文件一致性检查
        echo "1. 配置文件一致性检查:"
        if ! cmp -s .config .config.original; then
          echo "❌ 致命错误：配置文件已被修改！"
          echo "差异摘要:"
          diff -u .config.original .config | grep -E "^[+-].*CONFIG_TARGET" | head -20
          exit 1
        fi
        echo "✅ 配置文件一致"
        
        # 2. x86配置检查
        echo "2. x86配置检查:"
        if grep -q "CONFIG_TARGET_x86=y" .config; then
          echo "❌ 致命错误：发现x86配置！"
          grep -i "CONFIG_TARGET_x86" .config
          exit 1
        fi
        echo "✅ 未发现x86配置"
        
        # 3. qualcommax配置检查
        echo "3. qualcommax配置检查:"
        if ! grep -q "CONFIG_TARGET_qualcommax=y" .config; then
          echo "❌ 致命错误：缺少qualcommax配置！"
          exit 1
        fi
        echo "✅ qualcommax配置存在"
        
        # 4. 目标设备检查
        echo "4. 目标设备检查:"
        if ! grep -q "CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_jdcloud_re-cs-02=y" .config; then
          echo "❌ 致命错误：缺少JDCloud设备配置！"
          exit 1
        fi
        echo "✅ JDCloud设备配置存在"
        
        echo "🎉 所有验证通过，可以开始编译！"
        
    - name: 编译固件
      run: |
        echo "🔨 开始编译固件..."
        cd isolated_build
        
        # 记录开始时间
        start_time=$(date +%s)
        
        # 编译（显示详细输出）
        make -j$(nproc) V=s 2>&1 | tee build.log || {
          echo "⚠️ 并行编译失败，尝试单线程编译..."
          make -j1 V=s 2>&1 | tee -a build.log
        }
        
        # 记录结束时间
        end_time=$(date +%s)
        duration=$((end_time - start_time))
        echo "⏱️ 编译耗时: ${duration}秒 ($((duration/60))分$((duration%60))秒)"
        
    - name: 验证编译结果
      run: |
        echo "🔍 验证编译结果..."
        cd isolated_build
        
        if [ -d "bin/targets/qualcommax/ipq60xx" ]; then
          echo "🎉 成功编译出ARM架构固件！"
          echo "固件目录: bin/targets/qualcommax/ipq60xx"
          echo "生成的固件文件:"
          find bin/targets/qualcommax/ipq60xx -name "*.bin" -o -name "*.img" | head -10
          
          # 显示文件大小
          for file in $(find bin/targets/qualcommax/ipq60xx -name "*.bin" -o -name "*.img" | head -5); do
            size=$(stat -c "%s" "$file" 2>/dev/null || stat -f "%z" "$file")
            echo "  - $(basename "$file"): $((size/1024/1024))MB"
          done
        else
          echo "❌ 错误：未找到ARM架构固件"
          echo "当前目录结构:"
          find bin/targets -type d 2>/dev/null || echo "未找到targets目录"
          exit 1
        fi
        
    - name: 上传固件
      if: env.UPLOAD_FIRMWARE == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: lede-firmware-arm-final
        path: isolated_build/bin/targets/
        retention-days: 7
