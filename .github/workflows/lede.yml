name: LEDE固件编译（终极修复版 - 修正Token）

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REPO_URL: https://github.com/coolsnowwolf/lede.git
  REPO_BRANCH: master
  FEEDS_CONF: lede/feeds.conf.default
  CONFIG_FILE: lede/ax6600.config
  DIY_P1_SH: lede/diy-part1.sh
  DIY_P2_SH: lede/diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  TZ: Asia/Shanghai
  # 关键：禁用所有自动配置
  CONFIG_AUTOREBUILD: "0"
  CONFIG_AUTOCONFIG: "0"

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    
    steps:
    - name: 检查磁盘空间
      run: |
        echo "编译前磁盘空间:"
        df -h
        
    - name: 快速磁盘清理
      run: |
        sudo apt-get clean 2>/dev/null || true
        sudo rm -rf /tmp/* /var/tmp/* 2>/dev/null || true
        
    - name: 检出代码仓库
      uses: actions/checkout@v4
      with:
        repository: fanling1970/jdcloud_re-cs-02
        token: ${{ secrets.GITHUB_TOKEN }}  # ✅ 修复这里！
        clean: true
        fetch-depth: 1
        
    - name: 验证源文件
      run: |
        echo "🔍 验证配置文件..."
        echo "文件路径: $(pwd)/$CONFIG_FILE"
        echo "文件大小:"
        ls -la "$CONFIG_FILE"
        echo ""
        echo "关键配置检查:"
        echo "x86配置:"
        grep -i "CONFIG_TARGET_x86" "$CONFIG_FILE" || echo "✅ 未发现x86配置"
        echo ""
        echo "qualcommax配置:"
        grep -i "CONFIG_TARGET_qualcommax" "$CONFIG_FILE" || echo "❌ 未找到qualcommax配置"
        
    - name: 初始化编译环境
      run: |
        echo "🚀 初始化编译环境..."
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          build-essential git gcc g++ make \
          bison flex gawk gettext \
          libncurses5-dev libncursesw5-dev \
          python3 curl wget \
          autoconf automake libtool \
          libssl-dev zlib1g-dev
        
    - name: 克隆LEDE源代码
      run: |
        echo "📥 克隆LEDE源代码..."
        git clone --depth=1 "$REPO_URL" -b "$REPO_BRANCH" openwrt
        
    - name: 加载配置（终极修复）
      run: |
        echo "🔧 加载配置文件（终极修复版）..."
        
        # 1. 彻底清理openwrt目录
        echo "🧹 彻底清理openwrt目录..."
        rm -rf openwrt/.config openwrt/tmp openwrt/staging_dir 2>/dev/null || true
        
        # 2. 验证原始文件
        echo "📄 验证原始配置文件:"
        head -30 "$CONFIG_FILE"
        echo ""
        echo "🔍 关键配置验证:"
        if grep -q "CONFIG_TARGET_x86=y" "$CONFIG_FILE"; then
          echo "❌ 错误：原始文件包含x86配置！"
          exit 1
        fi
        if ! grep -q "CONFIG_TARGET_qualcommax=y" "$CONFIG_FILE"; then
          echo "❌ 错误：原始文件缺少qualcommax配置！"
          exit 1
        fi
        echo "✅ 原始文件验证通过"
        
        # 3. 强制复制配置文件
        echo "📋 强制复制配置文件..."
        cp -f "$CONFIG_FILE" openwrt/.config
        
        # 4. 立即锁定配置文件
        echo "🔒 立即锁定配置文件..."
        chmod 444 openwrt/.config
        
        # 5. 创建多个备份
        echo "💾 创建配置文件备份..."
        cp openwrt/.config openwrt/.config.original
        cp openwrt/.config openwrt/.config.backup1
        cp openwrt/.config openwrt/.config.backup2
        
        # 6. 立即验证复制结果
        echo "🔍 立即验证复制结果:"
        echo "文件权限:"
        ls -la openwrt/.config
        echo ""
        echo "文件内容验证:"
        if grep -q "CONFIG_TARGET_x86=y" openwrt/.config; then
          echo "❌ 错误：复制后发现x86配置！"
          grep -i "CONFIG_TARGET_x86" openwrt/.config
          exit 1
        fi
        if ! grep -q "CONFIG_TARGET_qualcommax=y" openwrt/.config; then
          echo "❌ 错误：复制后缺少qualcommax配置！"
          exit 1
        fi
        echo "✅ 配置文件加载成功"
        
    - name: 加载后立即验证
      run: |
        echo "🔍 加载后立即验证配置..."
        echo "当前目录: $(pwd)"
        echo "配置文件路径: $(pwd)/openwrt/.config"
        echo ""
        
        # 检查文件是否存在
        if [ ! -f "openwrt/.config" ]; then
          echo "❌ 错误：配置文件不存在！"
          exit 1
        fi
        
        # 检查文件权限
        echo "文件权限:"
        stat -c "%A %n" openwrt/.config
        
        # 检查文件内容
        echo ""
        echo "🎯 关键配置检查:"
        echo "=== x86配置 ==="
        grep -E "^CONFIG_TARGET_x86" openwrt/.config || echo "✅ 未发现x86配置"
        echo ""
        echo "=== qualcommax配置 ==="
        grep -E "^CONFIG_TARGET_qualcommax" openwrt/.config || echo "❌ 未找到qualcommax配置"
        echo ""
        echo "=== 目标设备配置 ==="
        grep -i "jdcloud\|ipq60xx" openwrt/.config || echo "❌ 未找到目标设备配置"
        
        # 最终验证
        if grep -q "CONFIG_TARGET_x86=y" openwrt/.config; then
          echo "❌ 致命错误：验证时发现x86配置！"
          echo "完整x86相关配置:"
          grep -i "x86" openwrt/.config
          exit 1
        fi
        
        echo "✅ 加载后验证通过"
        
    - name: 更新feeds（跳过配置检查）
      run: |
        cd openwrt
        echo "🔄 更新feeds（跳过配置检查）..."
        
        # 关键：禁用所有自动配置检查
        export CONFIG_AUTOREBUILD=0
        export CONFIG_AUTOCONFIG=0
        
        # 复制feeds配置
        cp "$GITHUB_WORKSPACE/$FEEDS_CONF" feeds.conf.default 2>/dev/null || echo "使用默认feeds配置"
        
        # 更新feeds
        ./scripts/feeds update -a
        
        # 安装feeds
        ./scripts/feeds install -a
        
    - name: 验证配置（最终验证）
      run: |
        echo "🎯 最终配置验证..."
        echo "=========================================="
        
        # 1. 检查备份文件是否一致
        echo "🔍 检查备份文件一致性..."
        if ! cmp -s openwrt/.config openwrt/.config.original; then
          echo "❌ 错误：配置文件被修改！"
          echo "差异对比:"
          diff -u openwrt/.config.original openwrt/.config | head -50
          exit 1
        fi
        echo "✅ 备份文件一致"
        
        # 2. 检查x86配置
        echo ""
        echo "⚠️ 检查x86配置（绝对不应该有）:"
        if grep -q "CONFIG_TARGET_x86=y" openwrt/.config; then
          echo "❌ 致命错误：发现x86配置！"
          grep -i "CONFIG_TARGET_x86" openwrt/.config
          exit 1
        fi
        echo "✅ 未发现x86配置"
        
        # 3. 检查目标配置
        echo ""
        echo "🔍 检查目标设备配置:"
        if ! grep -q "CONFIG_TARGET_qualcommax=y" openwrt/.config; then
          echo "❌ 错误：未找到qualcommax配置！"
          exit 1
        fi
        if ! grep -q "CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_jdcloud_re-cs-02=y" openwrt/.config; then
          echo "❌ 错误：未找到JDCloud设备配置！"
          exit 1
        fi
        echo "✅ 目标设备配置正确"
        
        # 4. 显示完整配置
        echo ""
        echo "📊 完整目标架构配置:"
        grep -E "^CONFIG_TARGET_" openwrt/.config | grep -v "is not set" || echo "未找到已启用的目标架构"
        
        echo "✅ 最终验证通过"
        echo "=========================================="
        
    - name: 下载依赖（完全禁用自动配置）
      run: |
        cd openwrt
        echo "📥 下载依赖包（完全禁用自动配置）..."
        echo "⚠️ 使用环境变量彻底禁用自动配置"
        
        # 关键：使用环境变量彻底禁用所有自动配置
        CONFIG_AUTOREBUILD=0 CONFIG_AUTOCONFIG=0 make download -j$(nproc) || \
        CONFIG_AUTOREBUILD=0 CONFIG_AUTOCONFIG=0 make download -j1
        
    - name: 编译前最终检查
      run: |
        echo "🔍 编译前最终检查..."
        echo "=========================================="
        
        # 检查配置文件是否被修改
        if ! cmp -s openwrt/.config openwrt/.config.original; then
          echo "❌ 致命错误：配置文件在下载依赖阶段被修改！"
          echo "修改内容:"
          diff -u openwrt/.config.original openwrt/.config
          exit 1
        fi
        
        # 检查文件权限
        echo "文件权限检查:"
        stat -c "%A %n" openwrt/.config
        if [ "$(stat -c "%A" openwrt/.config)" != "-r--r--r--" ]; then
          echo "❌ 警告：文件权限被修改！"
          echo "重新锁定文件权限..."
          chmod 444 openwrt/.config
        fi
        
        echo "✅ 编译前检查通过"
        echo "=========================================="
        
    - name: 编译固件
      run: |
        cd openwrt
        echo "🔨 开始编译固件..."
        echo "使用核心数: $(nproc)"
        
        # 编译时也禁用自动配置
        CONFIG_AUTOREBUILD=0 CONFIG_AUTOCONFIG=0 make -j$(nproc) || \
        CONFIG_AUTOREBUILD=0 CONFIG_AUTOCONFIG=0 make -j1 V=s
        
    - name: 验证编译结果
      run: |
        echo "🔍 验证编译结果..."
        echo "=========================================="
        
        if [ -d "openwrt/bin/targets/qualcommax/ipq60xx" ]; then
          echo "✅ 成功编译出ARM架构固件！"
          echo "固件目录: openwrt/bin/targets/qualcommax/ipq60xx"
          find openwrt/bin/targets/qualcommax/ipq60xx -name "*.bin" -o -name "*.img" | head -10
        else
          echo "❌ 错误：未找到ARM架构固件"
          echo "当前目录结构:"
          find openwrt/bin/targets -type d 2>/dev/null || echo "未找到targets目录"
          exit 1
        fi
        
        echo "=========================================="
        
    - name: 上传固件
      if: env.UPLOAD_FIRMWARE == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: lede-firmware-arm
        path: openwrt/bin/targets/
        retention-days: 7
