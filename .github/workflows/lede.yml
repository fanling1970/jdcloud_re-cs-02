name: LEDE编译终极版（含DIY）

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: 检查DIY脚本
      run: |
        echo "🔍 检查DIY脚本..."
        for script in lede/diy-part1.sh lede/diy-part2.sh; do
          if [ -f "$script" ]; then
            echo "✅ 找到: $script"
            echo "大小: $(wc -l < "$script") 行"
            echo "内容预览:"
            head -10 "$script"
            echo ""
            # 确保有执行权限
            chmod +x "$script" 2>/dev/null || true
          else
            echo "ℹ️ 未找到: $script"
          fi
        done
    
    - name: 克隆LEDE源码
      run: git clone --depth=1 https://github.com/coolsnowwolf/lede.git lede-src
    
    - name: 执行DIY Part 1（如果存在）
      run: |
        if [ -f "lede/diy-part1.sh" ] && [ -s "lede/diy-part1.sh" ]; then
          echo "🔧 执行DIY Part 1..."
          cd lede-src
          chmod +x ../lede/diy-part1.sh
          ../lede/diy-part1.sh
        else
          echo "ℹ️ 跳过DIY Part 1（文件不存在或为空）"
        fi
    
    - name: 应用配置
      run: |
        cd lede-src
        if [ -f "../lede/ax6600-smart.config" ]; then
          cp ../lede/ax6600-smart.config .config
          echo "✅ 已应用智能配置"
        else
          echo "ℹ️ 使用默认配置"
        fi
    
    - name: 更新feeds
      run: |
        cd lede-src
        echo "🔄 更新feeds..."
        ./scripts/feeds update -a
        ./scripts/feeds install -a
    
    - name: 编译
      run: |
        cd lede-src
        echo "🔨 开始编译..."
        make defconfig
        make -j$(nproc) V=s 2>&1 | tee build.log || {
          echo "⚠️ 并行编译失败，尝试单线程..."
          make -j1 V=s 2>&1 | tee -a build.log
        }
    
    - name: 执行DIY Part 2（如果存在）
      run: |
        if [ -f "lede/diy-part2.sh" ] && [ -s "lede/diy-part2.sh" ]; then
          echo "🔧 执行DIY Part 2..."
          cd lede-src
          chmod +x ../lede/diy-part2.sh
          ../lede/diy-part2.sh
        else
          echo "ℹ️ 跳过DIY Part 2（文件不存在或为空）"
        fi
    
    - name: 验证结果
      run: |
        cd lede-src
        if [ -d "bin/targets/qualcommax/ipq60xx" ]; then
          echo "🎉 编译成功！"
          echo "固件文件:"
          find bin/targets/qualcommax/ipq60xx -name "*.bin" -o -name "*.img" | head -5
        else
          echo "❌ 编译失败"
          exit 1
        fi
    
    - name: 上传固件
      uses: actions/upload-artifact@v4
      with:
        name: firmware-with-diy
        path: lede-src/bin/targets/
