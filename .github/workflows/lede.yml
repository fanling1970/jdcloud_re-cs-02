name: LEDE固件编译（最精简版）

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/coolsnowwolf/lede.git
  REPO_BRANCH: master
  FEEDS_CONF: lede/feeds.conf.default
  CONFIG_FILE: lede/ax6600.config # 重要：改为ax6600.config
  DIY_P1_SH: lede/diy-part1.sh
  DIY_P2_SH: lede/diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: 检查磁盘空间
        run: |
          echo "编译前磁盘空间:"
          df -h
          
      - name: 快速磁盘清理
        run: |
          sudo apt-get clean 2>/dev/null || true
          sudo rm -rf /tmp/* /var/tmp/* 2>/dev/null || true
          
      - name: 检出代码仓库
        uses: actions/checkout@v4
        
      - name: 验证源文件
        run: |
          echo "📁 检查lede目录内容:"
          ls -la lede/
          echo ""
          echo "📄 检查ax6600.config是否存在:"
          [ -f lede/ax6600.config ] && echo "✅ ax6600.config存在" || echo "❌ ax6600.config不存在"
          echo ""
          echo "🔍 检查目标设备配置:"
          grep -i "jdcloud\|ipq60xx\|qualcommax" lede/ax6600.config || echo "未找到目标设备配置"
          
      - name: 初始化编译环境（最精简版）
        timeout-minutes: 8
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          echo "🚀 开始最精简初始化..."
          
          # 使用清华源加速
          sudo cp /etc/apt/sources.list /etc/apt/sources.list.backup
          sudo sed -i 's|http://.*ubuntu.com|https://mirrors.tuna.tsinghua.edu.cn|g' /etc/apt/sources.list
          
          echo "📦 快速更新软件包列表..."
          sudo apt-get update -qq 2>/dev/null || echo "更新跳过"
          
          echo "🔧 安装OpenWrt编译最小工具集..."
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            git \
            gcc g++ make \
            bison flex gawk gettext \
            libncurses5-dev libncursesw5-dev \
            python3 \
            curl wget \
            autoconf automake libtool \
            libssl-dev zlib1g-dev
          
          # 恢复原源文件
          sudo cp /etc/apt/sources.list.backup /etc/apt/sources.list
          
          # 设置时区
          sudo timedatectl set-timezone "$TZ"
          
          echo "✅ 初始化完成！"
          
      - name: 克隆LEDE源代码
        run: |
          echo "📥 克隆LEDE源代码..."
          git clone --depth=1 $REPO_URL -b $REPO_BRANCH openwrt
          
      - name: 加载配置（关键步骤）
        run: |
          echo "🔧 加载配置文件..."
          
          # 1. 加载feeds配置
          if [ -e "$FEEDS_CONF" ]; then
            echo "✅ 复制feeds.conf.default"
            cp "$FEEDS_CONF" openwrt/feeds.conf.default
          else
            echo "❌ feeds.conf.default不存在"
          fi
          
          # 2. 加载主配置文件（关键！）
          if [ -e "$CONFIG_FILE" ]; then
            echo "✅ 复制ax6600.config为.config"
            cp "$CONFIG_FILE" openwrt/.config
          else
            echo "❌ ax6600.config不存在"
            exit 1
          fi
          
          # 3. 设置脚本权限
          chmod +x "$DIY_P1_SH" "$DIY_P2_SH" 2>/dev/null || true
          
          echo "📋 验证.config文件内容:"
          head -20 openwrt/.config
          
      - name: 更新和安装软件源
        run: |
          cd openwrt
          echo "🔄 更新软件源..."
          ./scripts/feeds update -a
          echo "📦 安装软件包..."
          ./scripts/feeds install -a
          
          # 执行自定义脚本
          echo "⚙️ 执行自定义脚本..."
          [ -f "$GITHUB_WORKSPACE/$DIY_P1_SH" ] && "$GITHUB_WORKSPACE/$DIY_P1_SH" || echo "diy-part1.sh跳过"
          [ -f "$GITHUB_WORKSPACE/$DIY_P2_SH" ] && "$GITHUB_WORKSPACE/$DIY_P2_SH" || echo "diy-part2.sh跳过"
          
      - name: 验证目标配置（改进版）
        run: |
          cd openwrt
          echo "🎯 验证目标设备配置..."
          echo "=========================================="
          
          if [ -f .config ]; then
            echo "✅ .config文件存在"
            echo ""
            
            echo "📊 目标架构配置:"
            echo "------------------------------------------"
            grep -E "CONFIG_TARGET_" .config | head -30
            
            echo ""
            echo "🔍 JDCloud RE-CS-02 特定配置:"
            echo "------------------------------------------"
            grep -i "jdcloud\|ipq60xx\|qualcommax" .config || echo "未找到JDCloud相关配置"
            
            echo ""
            echo "⚠️ 检查是否有x86配置（不应该有）:"
            echo "------------------------------------------"
            grep -i "x86\|x86_64" .config && echo "警告：发现x86配置！" || echo "✅ 未发现x86配置"
            
          else
            echo "❌ .config文件不存在！"
            exit 1
          fi
          
          echo "=========================================="
          
      - name: 下载依赖包（修复版）
        run: |
          cd openwrt
          echo "📥 下载依赖包..."
          echo "⚠️ 注意：已移除 make defconfig，使用现有.config文件"
          
          # 重要：不再使用 make defconfig，避免覆盖配置
          # 直接下载依赖包
          make download -j$(nproc) || make download -j1
          
      - name: 编译固件
        timeout-minutes: 120
        run: |
          cd openwrt
          echo "🔨 使用 $(nproc) 线程编译..."
          
          echo "📊 最终编译配置验证:"
          echo "------------------------------------------"
          grep -E "CONFIG_TARGET_BOARD|CONFIG_TARGET_SUBTARGET|CONFIG_TARGET_PROFILE|CONFIG_TARGET_ARCH_PACKAGES" .config
          echo "------------------------------------------"
          
          make -j$(nproc) || make -j1 || make -j1 V=s
          
      - name: 验证编译结果
        if: success()
        run: |
          echo "📊 检查编译结果..."
          
          echo "🔍 查找固件文件:"
          find openwrt/bin/targets -name "*.bin" -o -name "*.img" -o -name "*.gz" 2>/dev/null | head -10
          
          echo ""
          echo "📁 固件目录结构:"
          find openwrt/bin/targets -type d 2>/dev/null
          
          echo ""
          echo "🎯 验证目标设备固件:"
          find openwrt/bin/targets -name "*jdcloud*" -o -name "*ipq60xx*" -o -name "*qualcommax*" 2>/dev/null || echo "未找到目标设备固件"
          
      - name: 上传固件
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: LEDE固件_$(date +%Y%m%d)
          path: openwrt/bin/targets/*/*/
