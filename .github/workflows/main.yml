name: 雅典娜RE-CS-02 指定Commit编译
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      # 极致清理，释放10G+空间
      - name: 深度清理系统
        run: |
          sudo apt remove -y dotnet-sdk-* ghc-* firefox openjdk-*
          sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache /var/lib/docker /usr/local/lib/android
          sudo apt autoremove -y && sudo apt clean && sudo rm -rf /var/lib/apt/lists/*
          df -h

      - name: 拉取指定commit源码
        uses: actions/checkout@v4
        with:
          ref: 8e6c72c836b44c5e4b4eef5086cef4f292eda244
          fetch-depth: 0

      - name: 安装编译依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses-dev gawk flex bison quilt libssl-dev libelf-dev zlib1g-dev git wget curl unzip python3 python3-distutils rsync file ccache

      - name: 加载feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 载入机型配置
        run: |
          cp config/re-cs-02.config .config
          make defconfig

      - name: 下载源码包
        run: make download -j$(nproc)

      - name: 编译固件
        run: make -j$(nproc)

      - name: 删除dl缓存减少占用
        run: rm -rf dl

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          path: bin/targets/ipq60xx/generic/*.img
          name: RE-CS02_固定commit固件
