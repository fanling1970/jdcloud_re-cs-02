name: 京东云RE-CS-02 79d246b固定commit复刻编译
on:
  workflow_dispatch:

jobs:
  build_firmware:
    runs-on: ubuntu-22.04
    steps:
      # 1. 深度清理磁盘防爆满
      - name: 释放系统磁盘空间
        run: |
          sudo apt remove -y dotnet-sdk-* ghc-* firefox openjdk-*
          sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache /var/lib/docker /usr/local/lib/android
          sudo apt autoremove -y && sudo apt clean && sudo rm -rf /var/lib/apt/lists/*
          df -h

      # 2. 克隆完整coolsnowwolf/lede主源码
      - name: 克隆完整LEDE源码
        run: git clone https://github.com/coolsnowwolf/lede.git lede

      # 3. 拉取79d246b固定commit配置，开启LFS拉射频校准文件
      - name: 拉取固定commit定制资源
        uses: actions/checkout@v4
        with:
          repository: fanling1970/jdcloud_re-cs-02
          ref: 79d246b6d0336bd5352ecb878236e2e8fe31c009
          path: diy_resource
          lfs: true

      # 打印目录排查文件结构
      - name: 打印DIY资源目录
        run: ls -la diy_resource/ diy_resource/lede/

      # 4. 复制脚本到lede源码根目录并执行定制脚本
      - name: 合并定制配置到LEDE源码
        run: |
          cp -r diy_resource/lede/* lede/
          cd lede
          chmod +x diy-part1.sh diy-part2.sh
          ./diy-part1.sh
          ./diy-part2.sh

      # 5. 安装全套编译依赖
      - name: 安装编译环境依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses-dev gawk flex bison quilt libssl-dev libelf-dev zlib1g-dev git wget curl unzip python3 python3-distutils rsync file ccache

      # ========== 顺序修正：先删冲突插件，再更新安装feeds ==========
      - name: 彻底删除所有冲突插件源码（fchomo/dae/daed/daede全套）
        run: |
          cd lede
          rm -rf package/feeds/luci/luci-app-fchomo
          rm -rf package/small/dae package/small/daed package/small/luci-app-daede
          rm -rf package/feeds/luci/luci-app-dae package/feeds/luci/luci-app-daed

      # 6. 更新&安装feeds（此时冲突插件已物理删除，不会复原）
      - name: 更新并安装feeds
        run: |
          cd lede
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # 逐行写入ipq60xx机型配置，无YAML EOF语法错误
      - name: 强制写入京东云ipq60xx硬件平台配置
        run: |
          cd lede
          echo 'CONFIG_TARGET_ipq60xx=y' > .config
          echo 'CONFIG_TARGET_ipq60xx_GENERIC=y' >> .config
          echo 'CONFIG_TARGET_PROFILE="JDCloud RE-CS-02"' >> .config
          echo 'CONFIG_TARGET_BOARD="ipq60xx"' >> .config
          echo 'CONFIG_TARGET_SUBTARGET="generic"' >> .config

      # 刷新配置，无冲突插件不会中断
      - name: 刷新配置并校验目标平台
        run: |
          cd lede
          make defconfig
          grep CONFIG_TARGET_BOARD .config

      # 预下载全部源码包
      - name: 预下载编译依赖源码
        run: cd lede && make download -j$(nproc)

      # 编译固件，完整日志方便排错
      - name: 编译OpenWrt固件
        run: cd lede && make -j$(nproc) V=s

      # 检索生成的固件文件
      - name: 检索所有img固件
        run: |
          cd lede
          find bin -type f -name "*.img"
          ls -la bin/targets/ipq60xx/generic/

      # 清理下载缓存释放磁盘
      - name: 清理dl缓存目录
        run: cd lede && rm -rf dl

      # 全局递归上传全部img固件
      - name: 上传成品刷机固件
        uses: actions/upload-artifact@v4
        with:
          path: lede/bin/**/*.img
          name: RE-CS02_79d246b_完整校准固件
          if-no-files-found: warn
