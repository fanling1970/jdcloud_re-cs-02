name: 雅典娜RE-CS-02 指定Commit编译
on:
  workflow_dispatch: # 仅手动启动

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 拉取仓库代码并锁定目标commit
        uses: actions/checkout@v4
        with:
          ref: 79d246b6d0336bd5352ecb878236e2e8fe31c009
          fetch-depth: 0

      - name: 安装编译依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses-dev gawk flex bison quilt libssl-dev libelf-dev zlib1g-dev git wget curl unzip python3 python3-distutils rsync file ccache

      - name: 更新并安装feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 加载机型配置
        run: |
          cp config/re-cs-02.config .config
          make defconfig

      - name: 预下载源码包
        run: make download -j$(nproc)

      - name: 编译固件
        run: make -j$(nproc)

      - name: 上传固件成品
        uses: actions/upload-artifact@v4
        with:
          path: bin/targets/ipq60xx/generic/*.img
          name: RE-CS02_固定commit固件
