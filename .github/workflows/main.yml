name: 雅典娜RE-CS-02 79d246b 固定commit编译
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      # 深度清理磁盘，解决空间爆满
      - name: 系统深度清理释放空间
        run: |
          sudo apt remove -y dotnet-sdk-* ghc-* firefox openjdk-*
          sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache /var/lib/docker /usr/local/lib/android
          sudo apt autoremove -y && sudo apt clean && sudo rm -rf /var/lib/apt/lists/*
          df -h

      # 拉取指定commit代码并下载LFS射频校准文件
      - name: 拉取源码
        uses: actions/checkout@v4
        with:
          ref: 79d246b6d0336bd5352ecb878236e2e8fe31c009
          fetch-depth: 0
          lfs: true

      # 安装编译依赖
      - name: 安装全套编译依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses-dev gawk flex bison quilt libssl-dev libelf-dev zlib1g-dev git wget curl unzip python3 python3-distutils rsync file ccache

      # 关键：进入lede子目录再执行feeds命令
      - name: 更新&安装feeds插件源
        run: |
          cd $GITHUB_WORKSPACE/lede
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # 加载机型配置
      - name: 载入RE-CS-02配置
        run: |
          cd $GITHUB_WORKSPACE/lede
          cp config/re-cs-02.config .config
          make defconfig

      # 预下载源码包
      - name: 下载源码依赖
        run: |
          cd $GITHUB_WORKSPACE/lede
          make download -j$(nproc)

      # 编译固件
      - name: 编译固件
        run: |
          cd $GITHUB_WORKSPACE/lede
          make -j$(nproc)

      # 清理dl缓存
      - name: 清理下载缓存
        run: |
          cd $GITHUB_WORKSPACE/lede
          rm -rf dl

      # 上传固件，路径同步切换到lede下的bin目录
      - name: 上传成品固件
        uses: actions/upload-artifact@v4
        with:
          path: lede/bin/targets/ipq60xx/generic/*.img
          name: RE-CS02_79d246b正常固件
