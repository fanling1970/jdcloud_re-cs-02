name: 京东云RE-CS-02 79d246b固定commit复刻编译
on:
  workflow_dispatch:

jobs:
  build_firmware:
    runs-on: ubuntu-22.04
    steps:
      # 1. 深度清理磁盘防爆满
      - name: 释放系统磁盘空间
        run: |
          sudo apt remove -y dotnet-sdk-* ghc-* firefox openjdk-*
          sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache /var/lib/docker /usr/local/lib/android
          sudo apt autoremove -y && sudo apt clean && sudo rm -rf /var/lib/apt/lists/*
          df -h

      # 2. 克隆完整coolsnowwolf/lede主源码
      - name: 克隆完整LEDE源码
        run: git clone https://github.com/coolsnowwolf/lede.git lede

      # 3. 拉取79d246b固定commit配置，开启LFS
      - name: 拉取固定commit定制资源
        uses: actions/checkout@v4
        with:
          repository: fanling1970/jdcloud_re-cs-02
          ref: 79d246b6d0336bd5352ecb878236e2e8fe31c009
          path: diy_resource
          lfs: true

      # 新增：打印目录排查文件位置
      - name: 打印DIY资源目录结构
        run: ls -la diy_resource/

      # 4. 复制所有定制文件到lede
      - name: 合并定制配置到LEDE源码
        run: |
          # 复制顶层所有文件（sh脚本、conf）
          cp -r diy_resource/* lede/
          cd lede
          chmod +x diy-part1.sh diy-part2.sh
          ./diy-part1.sh
          ./diy-part2.sh

      # 5. 安装编译依赖
      - name: 安装编译环境依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses-dev gawk flex bison quilt libssl-dev libelf-dev zlib1g-dev git wget curl unzip python3 python3-distutils rsync file ccache

      # 6. 更新feeds
      - name: 更新并安装feeds软件源
        run: |
          cd lede
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # 修正：先确认config目录存在，再复制配置
      - name: 载入京东云雅典娜机型配置
        run: |
          cd lede
          ls -la
          # 如果config文件夹不存在则自动创建
          mkdir -p config
          # 查找配置文件并复制
          find . -name "re-cs-02.config"
          cp $(find . -name "re-cs-02.config") .config
          make defconfig

      # 7. 预下载源码包
      - name: 预下载编译依赖源码
        run: cd lede && make download -j$(nproc)

      # 8. 编译固件
      - name: 编译OpenWrt固件
        run: cd lede && make -j$(nproc)

      # 9. 清理缓存
      - name: 清理dl下载缓存
        run: cd lede && rm -rf dl

      # 10. 上传固件
      - name: 上传成品刷机固件
        uses: actions/upload-artifact@v4
        with:
          path: lede/bin/targets/ipq60xx/generic/*.img
          name: RE-CS02_79d246b_完整校准固件
