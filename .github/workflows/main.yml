name: 京东云RE-CS-02 79d246b固定commit复刻编译
on:
  workflow_dispatch:

jobs:
  build_firmware:
    runs-on: ubuntu-22.04
    steps:
      # 1. 深度清理磁盘防爆满
      - name: 释放系统磁盘空间
        run: |
          sudo apt remove -y dotnet-sdk-* ghc-* firefox openjdk-*
          sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache /var/lib/docker /usr/local/lib/android
          sudo apt autoremove -y && sudo apt clean && sudo rm -rf /var/lib/apt/lists/*
          df -h

      # 2. 克隆纯净coolsnowwolf/lede主源码
      - name: 克隆完整LEDE源码
        run: git clone https://github.com/coolsnowwolf/lede.git lede

      # 3. 拉取79d246b固定commit定制资源，开启LFS获取射频校准board-2.bin
      - name: 拉取固定commit配置文件
        uses: actions/checkout@v4
        with:
          repository: fanling1970/jdcloud_re-cs-02
          ref: 79d246b6d0336bd5352ecb878236e2e8fe31c009
          path: diy_resource
          lfs: true

      # 4. 仅复制DIY脚本，**不执行diy-part（避免自动添加small冲突插件源）**
      - name: 复制定制脚本，不执行DIY插件注入
        run: |
          cp -r diy_resource/lede/diy-part*.sh lede/
          cd lede
          chmod +x diy-part1.sh diy-part2.sh

      # 5. 安装编译依赖
      - name: 安装全套编译依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses-dev gawk flex bison quilt libssl-dev libelf-dev zlib1g-dev git wget curl unzip python3 python3-distutils rsync file ccache

      # 6. 原生feeds仅保留核心官方源，彻底移除small冲突插件源
      - name: 重置feeds为纯净官方源，屏蔽small插件
        run: |
          cd lede
          echo "src-git packages https://github.com/coolsnowwolf/packages" > feeds.conf.default
          echo "src-git luci https://github.com/coolsnowwolf/luci" >> feeds.conf.default
          echo "src-git routing https://github.com/coolsnowwolf/routing" >> feeds.conf.default
          echo "src-git telephony https://github.com/coolsnowwolf/telephony" >> feeds.conf.default
          cat feeds.conf.default

      # 7. 更新安装纯净feeds（无small仓库，不存在fchomo/dae插件）
      - name: 更新纯净插件源
        run: |
          cd lede
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # 8. 强制写入京东云RE-CS-02 ipq60xx完整硬件配置
      - name: 锁定ipq60xx雅典娜机型配置
        run: |
          cd lede
          echo 'CONFIG_TARGET_ipq60xx=y' > .config
          echo 'CONFIG_TARGET_ipq60xx_GENERIC=y' >> .config
          echo 'CONFIG_TARGET_PROFILE="JDCloud RE-CS-02"' >> .config
          echo 'CONFIG_TARGET_BOARD="ipq60xx"' >> .config
          echo 'CONFIG_TARGET_SUBTARGET="generic"' >> .config
          echo '# 禁用所有冲突插件' >> .config
          echo 'CONFIG_PACKAGE_luci-app-fchomo=n' >> .config
          echo 'CONFIG_PACKAGE_luci-app-dae=n' >> .config
          echo 'CONFIG_PACKAGE_luci-app-daed=n' >> .config
          echo 'CONFIG_PACKAGE_luci-app-daede=n' >> .config

      # 9. 同步基础配置，此时无small插件，不会报递归依赖错误
      - name: 同步基础配置并校验平台
        run: |
          cd lede
          make defconfig
          grep CONFIG_TARGET_BOARD .config

      # 10. 预下载编译依赖包
      - name: 预下载源码包
        run: cd lede && make download -j$(nproc)

      # 11. 完整日志编译固件
      - name: 编译OpenWrt固件
        run: cd lede && make -j$(nproc) V=s

      # 12. 检索固件输出路径
      - name: 查找生成的img固件
        run: |
          cd lede
          find bin -type f -name "*.img"
          ls -la bin/targets/ipq60xx/generic/

      # 13. 清理缓存释放磁盘
      - name: 清理dl下载缓存
        run: cd lede && rm -rf dl

      # 14. 递归上传全部固件
      - name: 上传成品刷机固件
        uses: actions/upload-artifact@v4
        with:
          path: lede/bin/**/*.img
          name: RE-CS02_79d246b_完整校准固件
          if-no-files-found: warn
