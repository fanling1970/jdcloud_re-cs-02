name: 京东云RE-CS-02 79d246b固定commit复刻编译
on:
  workflow_dispatch:

jobs:
  build_firmware:
    runs-on: ubuntu-22.04
    steps:
      # 1. 深度清理磁盘防爆满
      - name: 释放系统磁盘空间
        run: |
          sudo apt remove -y dotnet-sdk-* ghc-* firefox openjdk-*
          sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache /var/lib/docker /usr/local/lib/android
          sudo apt autoremove -y && sudo apt clean && sudo rm -rf /var/lib/apt/lists/*
          df -h

      # 2. 克隆完整coolsnowwolf/lede主源码
      - name: 克隆完整LEDE源码
        run: git clone https://github.com/coolsnowwolf/lede.git lede

      # 3. 拉取79d246b固定commit配置，开启LFS拉射频校准文件
      - name: 拉取固定commit定制资源
        uses: actions/checkout@v4
        with:
          repository: fanling1970/jdcloud_re-cs-02
          ref: 79d246b6d0336bd5352ecb878236e2e8fe31c009
          path: diy_resource
          lfs: true

      # 打印目录排查文件结构
      - name: 打印DIY资源目录
        run: ls -la diy_resource/ diy_resource/lede/

      # 4. 复制脚本到lede源码根目录并执行定制脚本
      - name: 合并定制配置到LEDE源码
        run: |
          cp -r diy_resource/lede/* lede/
          cd lede
          chmod +x diy-part1.sh diy-part2.sh
          ./diy-part1.sh
          ./diy-part2.sh

      # 5. 安装全套编译依赖
      - name: 安装编译环境依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses-dev gawk flex bison quilt libssl-dev libelf-dev zlib1g-dev git wget curl unzip python3 python3-distutils rsync file ccache

      # 6. 更新&安装feeds插件源
      - name: 更新并安装feeds
        run: |
          cd lede
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # 7. 生成机型默认配置
      - name: 生成默认编译配置
        run: |
          cd lede
          make defconfig
          # 打印当前选中的目标平台，确认是否为ipq60xx
          grep CONFIG_TARGET_BOARD .config

      # 8. 预下载全部源码包
      - name: 预下载编译依赖源码
        run: cd lede && make download -j$(nproc)

      # 9. 编译固件，增加V=s输出详细编译日志，方便排错
      - name: 编译OpenWrt固件
        run: cd lede && make -j$(nproc) V=s

      # 新增：打印所有bin目录，确认固件实际输出路径
      - name: 查看编译输出目录
        run: |
          cd lede
          find bin -type f -name "*.img"
          ls -la bin/targets/*/generic/

      # 10. 清理下载缓存
      - name: 清理dl缓存节省空间
        run: cd lede && rm -rf dl

      # 11. 上传成品固件：路径改为全局匹配所有img文件，兜底适配目录变化
      - name: 上传成品固件
        uses: actions/upload-artifact@v4
        with:
          path: lede/bin/**/*.img
          name: RE-CS02_79d246b_完整校准固件
          if-no-files-found: warn
