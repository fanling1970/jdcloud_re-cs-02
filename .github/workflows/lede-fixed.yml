name: LEDE编译终极版（含DIY）- 修复版

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: 检查DIY脚本
      run: |
        echo "🔍 检查DIY脚本..."
        for script in lede/diy-part1.sh lede/diy-part2.sh; do
          if [ -f "$script" ]; then
            echo "✅ 找到: $script"
            echo "大小: $(wc -l < "$script") 行"
            echo "内容预览:"
            head -10 "$script"
            echo ""
            # 确保有执行权限
            chmod +x "$script" 2>/dev/null || true
          else
            echo "ℹ️ 未找到: $script"
          fi
        done
    
    - name: 克隆LEDE源码
      run: git clone --depth=1 https://github.com/coolsnowwolf/lede.git lede-src
    
    - name: 执行DIY Part 1（如果存在）
      run: |
        if [ -f "lede/diy-part1.sh" ] && [ -s "lede/diy-part1.sh" ]; then
          echo "🔧 执行DIY Part 1..."
          cd lede-src
          chmod +x ../lede/diy-part1.sh
          ../lede/diy-part1.sh
        else
          echo "ℹ️ 跳过DIY Part 1（文件不存在或为空）"
        fi
    
    - name: 验证并应用配置
      run: |
        echo "🔍 验证配置文件..."
        
        # 检查配置文件是否存在
        if [ ! -f "lede/ax6600-smart.config" ]; then
          echo "❌ 配置文件不存在: lede/ax6600-smart.config"
          exit 1
        fi
        
        # 检查文件格式
        echo "📄 配置文件信息:"
        file "lede/ax6600-smart.config"
        echo "行数: $(wc -l < lede/ax6600-smart.config)"
        
        # 检查第一行
        echo "第一行: $(head -n 1 lede/ax6600-smart.config)"
        
        # 检查是否有Tab字符
        if grep -q $'\t' "lede/ax6600-smart.config"; then
          echo "⚠️ 发现Tab字符，正在替换为空格..."
          sed -i 's/\t/    /g' "lede/ax6600-smart.config"
        fi
        
        # 检查是否有BOM标记
        if head -c 3 "lede/ax6600-smart.config" | grep -q $'\xef\xbb\xbf'; then
          echo "⚠️ 发现BOM标记，正在移除..."
          sed -i '1s/^\xEF\xBB\xBF//' "lede/ax6600-smart.config"
        fi
        
        # 应用配置
        cd lede-src
        cp ../lede/ax6600-smart.config .config
        echo "✅ 已应用智能配置"
        
        # 验证配置格式
        echo "🔍 验证.config格式..."
        if ! make -s -C . oldconfig 2>/dev/null; then
          echo "❌ .config格式错误"
          echo "前10行内容:"
          head -n 10 .config
          exit 1
        fi
    
    - name: 更新feeds（强制模式）
      run: |
        cd lede-src
        echo "🔄 更新feeds（强制模式）..."
        FORCE=1 ./scripts/feeds update -a
        FORCE=1 ./scripts/feeds install -a
        
        # 验证feeds更新成功
        if [ -d "./feeds" ] && [ -f "./feeds/packages.index" ]; then
          echo "✅ feeds更新成功"
        else
          echo "❌ feeds更新失败"
          exit 1
        fi
    
    - name: 编译（强制模式）
      run: |
        cd lede-src
        echo "🔨 开始编译（强制模式）..."
        
        # 先备份配置
        cp .config .config.backup
        
        # 编译
        FORCE=1 make defconfig
        FORCE=1 make -j$(nproc) V=s 2>&1 | tee build.log || {
          echo "⚠️ 并行编译失败，尝试单线程..."
          FORCE=1 make -j1 V=s 2>&1 | tee -a build.log
        }
        
        # 检查编译结果
        if [ $? -eq 0 ]; then
          echo "🎉 编译完成"
        else
          echo "❌ 编译失败"
          echo "最后10行日志:"
          tail -n 10 build.log
          exit 1
        fi
    
    - name: 执行DIY Part 2（如果存在）
      run: |
        if [ -f "lede/diy-part2.sh" ] && [ -s "lede/diy-part2.sh" ]; then
          echo "🔧 执行DIY Part 2..."
          cd lede-src
          chmod +x ../lede/diy-part2.sh
          ../lede/diy-part2.sh
        else
          echo "ℹ️ 跳过DIY Part 2（文件不存在或为空）"
        fi
    
    - name: 验证结果
      run: |
        cd lede-src
        if [ -d "bin/targets/qualcommax/ipq60xx" ]; then
          echo "🎉 编译成功！"
          echo "固件文件:"
          find bin/targets/qualcommax/ipq60xx -name "*.bin" -o -name "*.img" | head -5
          echo ""
          echo "📊 固件信息:"
          for file in $(find bin/targets/qualcommax/ipq60xx -name "*.bin" -o -name "*.img" | head -3); do
            echo "文件: $(basename $file)"
            echo "大小: $(du -h $file | cut -f1)"
            echo "MD5: $(md5sum $file | cut -d' ' -f1)"
            echo "---"
          done
        else
          echo "❌ 编译失败：未找到目标目录"
          echo "当前目录结构:"
          find bin/targets -type d 2>/dev/null || echo "bin/targets目录不存在"
          exit 1
        fi
    
    - name: 上传固件
      uses: actions/upload-artifact@v4
      with:
        name: firmware-with-diy
        path: lede-src/bin/targets/
