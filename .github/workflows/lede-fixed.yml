name: LEDE编译终极版（含DIY）- 修复版

on:
  workflow_dispatch:
    inputs:
      force_build:
        description: '强制重新编译（忽略缓存）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  DEBIAN_FRONTEND: noninteractive
  COMPILE_NONINTERACTIVE: 1

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Starting job
      run: echo "🚀 LEDE编译开始于 $(date)"
    
    - name: Set up job
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
    
    - name: 检查DIY脚本
      run: |
        echo "🔍 检查DIY脚本..."
        if [ -f "lede/diy-part1.sh" ]; then
          echo "✅ 找到 diy-part1.sh"
          chmod +x lede/diy-part1.sh
        fi
        if [ -f "lede/diy-part2.sh" ]; then
          echo "✅ 找到 diy-part2.sh"
          chmod +x lede/diy-part2.sh
        fi
    
    - name: 克隆LEDE源码
      run: |
        echo "📥 克隆LEDE源码..."
        git clone --depth=1 https://github.com/coolsnowwolf/lede.git lede-source
        cd lede-source
        
        # 复制配置文件
        cp ../lede/feeds.conf.default .
        cp ../lede/ax6600-smart.config .config
    
    - name: 执行DIY Part 1（如果存在）
      run: |
        echo "🔧 执行DIY Part 1..."
        cd lede-source
        if [ -f "../lede/diy-part1.sh" ]; then
          echo "执行自定义脚本..."
          ../lede/diy-part1.sh
        else
          echo "未找到 diy-part1.sh，跳过"
        fi
    
    - name: 验证并应用配置（修复版）
      run: |
        echo "⚙️ 验证并应用配置..."
        cd lede-source
        
        # 关键修复：使用defconfig避免交互式配置
        echo "应用智能配置..."
        cp .config .config.backup
        
        # 先应用用户配置
        echo "生成完整配置..."
        make defconfig
        
        # 再次应用用户配置，确保覆盖
        if [ -f "../lede/ax6600-smart.config" ]; then
          echo "合并用户配置..."
          cat ../lede/ax6600-smart.config >> .config
          make defconfig
        fi
        
        echo "配置完成，检查配置..."
        grep -E "CONFIG_TARGET|CONFIG_PACKAGE" .config | head -20
    
    - name: 更新feeds（强制模式）
      run: |
        echo "📦 更新feeds..."
        cd lede-source
        ./scripts/feeds update -a
        ./scripts/feeds install -a
    
    - name: 编译（强制模式）
      run: |
        echo "🔨 开始编译..."
        cd lede-source
        
        # 设置编译环境
        export FORCE_UNSAFE_CONFIGURE=1
        
        # 开始编译
        echo "编译内核..."
        make -j$(nproc) download
        make -j$(nproc) || make -j1 V=s
        
        echo "编译完成，检查固件..."
        if [ -d "bin/targets" ]; then
          find bin/targets -name "*.bin" -o -name "*.img" | head -10
        fi
    
    - name: 执行DIY Part 2（如果存在）
      run: |
        echo "🔧 执行DIY Part 2..."
        cd lede-source
        if [ -f "../lede/diy-part2.sh" ]; then
          echo "执行编译后自定义操作..."
          ../lede/diy-part2.sh
        else
          echo "未找到 diy-part2.sh，跳过"
        fi
    
    - name: 验证结果
      run: |
        echo "✅ 验证编译结果..."
        cd lede-source
        
        if [ -d "bin/targets" ]; then
          echo "固件生成成功！"
          echo "固件位置："
          find bin/targets -type f -name "*.bin" -o -name "*.img" | while read file; do
            echo "  - $file ($(du -h "$file" | cut -f1))"
          done
        else
          echo "❌ 固件生成失败"
          exit 1
        fi
    
    - name: 上传固件
      uses: actions/upload-artifact@v4
      with:
        name: lede-firmware
        path: lede-source/bin/targets/
        retention-days: 7
    
    - name: 完成通知
      run: |
        echo "🎉 LEDE编译完成！"
        echo "固件已上传到Artifacts"
        echo "下载链接将在工作流完成后可用"
