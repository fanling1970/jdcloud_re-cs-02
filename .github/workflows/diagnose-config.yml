name: 配置文件诊断

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-22.04
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 深度诊断配置文件
      run: |
        echo "🔍 === 配置文件深度诊断 ==="
        echo ""
        
        # 1. 检查原始配置文件
        echo "📁 1. 检查lede/ax6600.config文件:"
        echo "文件大小:"
        ls -la lede/ax6600.config
        echo ""
        echo "文件前30行内容:"
        head -30 lede/ax6600.config
        echo ""
        echo "检查x86配置:"
        grep -i "CONFIG_TARGET_x86" lede/ax6600.config || echo "✅ 未发现x86配置"
        echo ""
        echo "检查qualcommax配置:"
        grep -i "CONFIG_TARGET_qualcommax" lede/ax6600.config || echo "❌ 未找到qualcommax配置"
        echo ""
        
        # 2. 创建openwrt目录
        echo "📁 2. 创建openwrt目录结构:"
        mkdir -p openwrt
        echo "openwrt目录创建完成"
        echo ""
        
        # 3. 复制配置文件
        echo "📋 3. 复制配置文件:"
        cp lede/ax6600.config openwrt/.config
        echo "复制完成"
        echo ""
        
        # 4. 立即验证复制后的文件
        echo "🔍 4. 立即验证复制后的.config文件:"
        echo "文件大小:"
        ls -la openwrt/.config
        echo ""
        echo "文件前30行内容:"
        head -30 openwrt/.config
        echo ""
        echo "检查x86配置:"
        grep -i "CONFIG_TARGET_x86" openwrt/.config || echo "✅ 未发现x86配置"
        echo ""
        echo "检查qualcommax配置:"
        grep -i "CONFIG_TARGET_qualcommax" openwrt/.config || echo "❌ 未找到qualcommax配置"
        echo ""
        
        # 5. 完整配置文件对比
        echo "📊 5. 完整配置文件对比:"
        echo "原始文件行数:"
        wc -l lede/ax6600.config
        echo "复制文件行数:"
        wc -l openwrt/.config
        echo ""
        echo "文件差异:"
        diff -u lede/ax6600.config openwrt/.config | head -50 || echo "✅ 文件完全相同"
        echo ""
        
        # 6. 关键配置验证
        echo "🎯 6. 关键配置验证:"
        echo "=== 目标架构配置 ==="
        grep -E "^CONFIG_TARGET_" openwrt/.config | head -20
        echo ""
        echo "=== x86相关配置 ==="
        grep -E "CONFIG_TARGET_x86|CONFIG_TARGET_x86_64" openwrt/.config || echo "未找到x86配置"
        echo ""
        echo "=== qualcommax相关配置 ==="
        grep -E "CONFIG_TARGET_qualcommax|CONFIG_TARGET_qualcommax_ipq60xx" openwrt/.config || echo "未找到qualcommax配置"
        echo ""
        
        echo "✅ 诊断完成"
